<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#030712" id="meta-theme">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ '/assets/images/og-card.svg' | absolute_url }}">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/icon.svg' | relative_url }}">
  <link rel="preconnect" href="https://assets-cdn.trustwallet.com" crossorigin>
  {% seo %}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLW58KQT27"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JLW58KQT27');
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { primary: 'var(--surface-primary)', secondary: 'var(--surface-secondary)', tertiary: 'var(--surface-tertiary)' },
            border: { primary: 'var(--border-primary)', secondary: 'var(--border-secondary)' },
            accent: '#3b82f6',
          },
          fontFamily: {
            sans: ['ui-sans-serif','system-ui','sans-serif','Apple Color Emoji','Segoe UI Emoji'],
            mono: ['ui-monospace','SFMono-Regular','SF Mono','Menlo','Consolas','monospace'],
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    #mobile-menu.hidden { display: none; }

    /* Light/dark CSS variables */
    :root {
      --surface-primary: #ffffff;
      --surface-secondary: #f9fafb;
      --surface-tertiary: #f3f4f6;
      --border-primary: #e5e7eb;
      --border-secondary: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #374151;
      --text-muted: #4b5563;
    }
    .dark {
      --surface-primary: #030712;
      --surface-secondary: #111827;
      --surface-tertiary: #1f2937;
      --border-primary: #1f2937;
      --border-secondary: rgba(31, 41, 55, 0.5);
      --text-primary: #ffffff;
      --text-secondary: #d1d5db;
      --text-muted: #4b5563;
    }

    /* Fade-in animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      opacity: 0;
      animation: fadeInUp 0.5s ease-out forwards;
    }
    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }

    /* FAQ details styling */
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details summary::before {
      content: '+';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.25rem;
      height: 1.25rem;
      margin-right: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #3b82f6;
      flex-shrink: 0;
    }
    details[open] summary::before { content: '−'; }
    details summary { display: flex; align-items: center; }

    /* MPC signing animation */
    @keyframes msgRight {
      0% { left: 0; opacity: 0; }
      10% { opacity: 1; }
      45% { left: calc(100% - 10px); opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 0; left: calc(100% - 10px); }
    }
    @keyframes msgLeft {
      0% { right: 0; opacity: 0; }
      10% { opacity: 1; }
      45% { right: calc(100% - 10px); opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 0; right: calc(100% - 10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
      50% { box-shadow: 0 0 12px 4px rgba(59,130,246,0.3); }
    }
    /* 12s total: 3 rounds (2s each = 6s) + hold 4s + fade 2s
       Single envelope alternates: R1 blue→, R2 green←, R3 blue→ */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
      50% { box-shadow: 0 0 12px 4px rgba(59,130,246,0.3); }
    }
    @keyframes sig-steps {
      0%, 16% { width: 0; }
      17% { width: 33%; }
      33% { width: 33%; }
      34% { width: 66%; }
      50% { width: 66%; }
      51% { width: 100%; }
      83% { width: 100%; opacity: 1; }
      92% { opacity: 0; }
      100% { width: 0; opacity: 0; }
    }
    @keyframes verified-appear {
      0%, 50% { opacity: 0; transform: scale(0.5); }
      53% { opacity: 1; transform: scale(1.15); }
      56% { transform: scale(1); }
      83% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }
    .mpc-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .sig-progress { animation: sig-steps 12s ease-out infinite; }
    .sig-verified { animation: verified-appear 12s ease-out infinite; opacity: 0; }

    /* Why kexify hover — red border on competitors */
    .compare-card { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    .compare-card:hover { border-color: #f87171; box-shadow: 0 0 8px rgba(248,113,113,0.15); }

    /* Typing cursor */
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .typing-cursor::after { content: '|'; animation: blink 0.8s step-end infinite; color: #3b82f6; }

    /* Counter number */
    .counter { display: inline-block; min-width: 1.5ch; text-align: right; }

    /* Parallax K logo */
    .parallax-logo { transition: transform 0.1s ease-out; }

    /* Back to top */
    #back-to-top {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #back-to-top.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
  <script>
    /* Theme: respect system preference + localStorage toggle */
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', theme === 'dark');
    })();
  </script>
</head>
<body class="bg-surface-primary dark:text-gray-100 text-gray-900 min-h-screen flex flex-col font-sans antialiased">

  {% include nav.html %}

  <main class="flex-1">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Back to top button -->
  <a href="#" id="back-to-top" class="fixed bottom-6 right-6 p-2 bg-surface-tertiary border border-border-primary rounded-lg text-gray-400 hover:text-white transition-colors" aria-label="Back to top">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
    </svg>
  </a>

  <script>
    /* Back to top visibility */
    var backBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', function() {
      backBtn.classList.toggle('visible', window.scrollY > 300);
    });
  </script>
</body>
</html>
