<nav class="border-b border-border-primary">
  <div class="max-w-5xl mx-auto px-4 md:px-8">
    <div class="flex items-center justify-between py-3">

      <!-- Logo with SVG icon -->
      <a href="{{ '/' | relative_url }}" class="no-underline">
        <span class="block text-[30px] leading-[36px] font-bold tracking-tight dark:text-white text-gray-900">kexify</span>
        <span class="block text-[11px] dark:text-[#4b5563] text-[#9ca3af]">keys simplified</span>
      </a>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-6">
        {% assign current = page.url | remove: '/index.html' | remove: '.html' %}
        <a href="{{ '/' | relative_url }}" class="text-sm transition-colors {% if current == '/' or current == '' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">Home</a>
        <a href="{{ '/faq' | relative_url }}" class="text-sm transition-colors {% if current == '/faq' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">FAQ</a>
        <a href="{{ '/about' | relative_url }}" class="text-sm transition-colors {% if current == '/about' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">About</a>

        <!-- Theme toggle -->
        <button id="theme-toggle" class="p-2 text-gray-400 hover:text-white transition-colors" aria-label="Toggle theme">
          <!-- Sun (shown in dark mode) -->
          <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <!-- Moon (shown in light mode) -->
          <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <a href="http://app.kexify.co/" class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors">
          Open App
        </a>
      </div>

      <!-- Mobile hamburger -->
      <div class="flex md:hidden items-center gap-2">
        <button id="theme-toggle-mobile" class="p-2 text-gray-400 hover:text-white" aria-label="Toggle theme">
          <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <button id="menu-btn" class="p-2 text-gray-400 hover:text-white" aria-label="Toggle menu">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden pb-4 space-y-2">
      {% assign current = page.url | remove: '/index.html' | remove: '.html' %}
      <a href="{{ '/' | relative_url }}" class="block text-sm py-2 {% if current == '/' or current == '' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">Home</a>
      <a href="{{ '/faq' | relative_url }}" class="block text-sm py-2 {% if current == '/faq' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">FAQ</a>
      <a href="{{ '/about' | relative_url }}" class="block text-sm py-2 {% if current == '/about' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">About</a>
      <a href="http://app.kexify.co/" class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors mt-2">
        Open App
      </a>
    </div>
  </div>

  <script>
    document.getElementById('menu-btn').addEventListener('click', function() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
    /* Both theme toggles share the same logic */
    function toggleTheme() {
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('meta-theme').content = isDark ? '#030712' : '#ffffff';
    }
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('theme-toggle-mobile').addEventListener('click', toggleTheme);
  </script>
</nav>
